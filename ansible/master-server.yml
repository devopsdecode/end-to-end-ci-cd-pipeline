---
- hosts: master-server
  become: yes
  tasks:

    # --- System Prerequisites ---
    - name: Update APT package cache
      apt:
        update_cache: yes

    - name: Install required system dependencies
      apt:
        name:
          - wget
          - curl
          - gnupg
          - ca-certificates
          - software-properties-common
          - fontconfig
        state: present

    - name: Install Java 21 (required by Jenkins 2.463+)
      apt:
        name: openjdk-21-jre
        state: present

    - name: Get JAVA_HOME path
      shell: dirname $(dirname $(readlink -f $(which java)))
      register: java_home_path
      changed_when: false

    - name: Set JAVA_HOME in /etc/environment
      lineinfile:
        path: /etc/environment
        regexp: '^JAVA_HOME='
        line: "JAVA_HOME={{ java_home_path.stdout }}"
        state: present

    - name: Configure JAVA_HOME for Jenkins service
      lineinfile:
        path: /etc/default/jenkins
        regexp: '^JAVA='
        line: "JAVA={{ java_home_path.stdout }}/bin/java"
        state: present
        create: yes

    # --- Jenkins Installation ---
    - name: Ensure /etc/apt/keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Download Jenkins GPG signing key
      get_url:
        url: https://pkg.jenkins.io/debian/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc
        owner: root
        group: root
        mode: '0644'
        force: yes

    - name: Add Jenkins APT repository
      copy:
        dest: /etc/apt/sources.list.d/jenkins.list
        content: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian binary/\n"
        owner: root
        group: root
        mode: '0644'

    - name: Update APT cache after adding Jenkins repo
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Ensure Jenkins service is started and enabled
      systemd:
        name: jenkins
        state: started
        enabled: yes

    - name: Capture Jenkins journal log (for diagnostics)
      shell: journalctl -n 30 -u jenkins.service --no-pager
      register: jenkins_journal
      changed_when: false
      failed_when: false

    - name: Print Jenkins journal output
      debug:
        msg: "{{ jenkins_journal.stdout_lines }}"
